<svg width="100%" viewBox="0 0 680 310" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>3D printing clearance gap between housing and insert</title>
  <rect width="680" height="310" rx="12" fill="#1a1a14"/>

  <!-- Outer housing -->
  <rect x="160" y="60" width="360" height="170" rx="16" fill="#d4782a" stroke="#e8943a" stroke-width="2"/>
  <!-- Dark inner cutout -->
  <rect x="185" y="85" width="310" height="120" rx="10" fill="#1a1a14"/>
  <!-- Inner insert -->
  <rect x="205" y="105" width="270" height="80" rx="8" fill="#a05820" stroke="#c8853a" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="340" y="150" text-anchor="middle" font-family="monospace" font-size="13" fill="#c8853a">INSERT</text>
  <text x="340" y="48" text-anchor="middle" font-family="monospace" font-size="13" fill="#e8943a">HOUSING</text>

  <!-- Left dimension lines (gap between cutout edge and insert edge) -->
  <line x1="185" y1="210" x2="185" y2="258" stroke="#3aad3a" stroke-width="0.8"/>
  <line x1="205" y1="190" x2="205" y2="258" stroke="#3aad3a" stroke-width="0.8"/>
  <line x1="185" y1="253" x2="205" y2="253" stroke="#3aad3a" stroke-width="1.5"/>
  <line x1="185" y1="248" x2="185" y2="258" stroke="#3aad3a" stroke-width="1.5"/>
  <line x1="205" y1="248" x2="205" y2="258" stroke="#3aad3a" stroke-width="1.5"/>
  <text x="195" y="275" text-anchor="middle" font-family="monospace" font-size="12" fill="#3aad3a">0.2mm</text>

  <!-- Right dimension lines -->
  <line x1="475" y1="190" x2="475" y2="258" stroke="#3aad3a" stroke-width="0.8"/>
  <line x1="495" y1="210" x2="495" y2="258" stroke="#3aad3a" stroke-width="0.8"/>
  <line x1="475" y1="253" x2="495" y2="253" stroke="#3aad3a" stroke-width="1.5"/>
  <line x1="475" y1="248" x2="475" y2="258" stroke="#3aad3a" stroke-width="1.5"/>
  <line x1="495" y1="248" x2="495" y2="258" stroke="#3aad3a" stroke-width="1.5"/>
  <text x="485" y="275" text-anchor="middle" font-family="monospace" font-size="12" fill="#3aad3a">0.2mm</text>
</svg>
