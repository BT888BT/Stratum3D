<line x1="495" y1="205" x2="495" y2="258" stroke="#3aad3a" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(58, 173, 58);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<line x1="475" y1="253" x2="495" y2="253" stroke="#3aad3a" stroke-width="1.5" style="fill:rgb(0, 0, 0);stroke:rgb(58, 173, 58);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<line x1="475" y1="248" x2="475" y2="258" stroke="#3aad3a" stroke-width="1.5" style="fill:rgb(0, 0, 0);stroke:rgb(58, 173, 58);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<line x1="495" y1="248" x2="495" y2="258" stroke="#3aad3a" stroke-width="1.5" style="fill:rgb(0, 0, 0);stroke:rgb(58, 173, 58);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="485" y="275" text-anchor="middle" font-family="monospace" font-size="12" fill="#3aad3a" style="fill:rgb(58, 173, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">0.1mm</text>

