<svg width="100%" viewBox="0 0 680 230" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>3D printing clearance gap between housing and insert</title>
  <rect width="680" height="230" rx="12" fill="#1a1a14"/>

  <!-- Outer housing -->
  <rect x="160" y="24" width="360" height="140" rx="16" fill="#d4782a" stroke="#e8943a" stroke-width="2"/>
  <!-- Dark inner cutout -->
  <rect x="185" y="44" width="310" height="100" rx="10" fill="#1a1a14"/>
  <!-- Inner insert -->
  <rect x="205" y="59" width="270" height="70" rx="8" fill="#a05820" stroke="#c8853a" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="340" y="99" text-anchor="middle" font-family="monospace" font-size="13" fill="#c8853a">INSERT</text>
  <text x="340" y="16" text-anchor="middle" font-family="monospace" font-size="13" fill="#e8943a">HOUSING</text>

  <!-- Left dimension lines (gap between cutout edge x=185 and insert edge x=205) -->
  <line x1="185" y1="145" x2="185" y2="205" stroke="#3aad3a" stroke-width="0.8"/>
  <line x1="205" y1="130" x2="205" y2="205" stroke="#3aad3a" stroke-width="0.8"/>
  <line x1="185" y1="200" x2="205" y2="200" stroke="#3aad3a" stroke-width="1.5"/>
  <line x1="185" y1="195" x2="185" y2="205" stroke="#3aad3a" stroke-width="1.5"/>
  <line x1="205" y1="195" x2="205" y2="205" stroke="#3aad3a" stroke-width="1.5"/>
  <text x="195" y="220" text-anchor="middle" font-family="monospace" font-size="12" fill="#3aad3a">0.1mm</text>

  <!-- Right dimension lines (gap between insert edge x=475 and cutout edge x=495) -->
  <line x1="475" y1="130" x2="475" y2="205" stroke="#3aad3a" stroke-width="0.8"/>
  <line x1="495" y1="145" x2="495" y2="205" stroke="#3aad3a" stroke-width="0.8"/>
  <line x1="475" y1="200" x2="495" y2="200" stroke="#3aad3a" stroke-width="1.5"/>
  <line x1="475" y1="195" x2="475" y2="205" stroke="#3aad3a" stroke-width="1.5"/>
  <line x1="495" y1="195" x2="495" y2="205" stroke="#3aad3a" stroke-width="1.5"/>
  <text x="485" y="220" text-anchor="middle" font-family="monospace" font-size="12" fill="#3aad3a">0.1mm</text>
</svg>
