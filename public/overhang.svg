<svg width="100%" viewBox="0 0 680 230" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>3D printing overhang comparison</title>
  <rect width="680" height="230" rx="12" fill="#1a1a14"/>

  <!-- LEFT: Good overhang ≤45° -->
  <line x1="80" y1="180" x2="175" y2="180" stroke="#a05820" stroke-width="8" stroke-linecap="butt"/>
  <line x1="80" y1="168" x2="195" y2="168" stroke="#a05820" stroke-width="8" stroke-linecap="butt"/>
  <line x1="80" y1="156" x2="215" y2="156" stroke="#a05820" stroke-width="8" stroke-linecap="butt"/>
  <line x1="215" y1="156" x2="228" y2="156" stroke="#3aad3a" stroke-width="8" stroke-linecap="butt"/>
  <line x1="80" y1="144" x2="235" y2="144" stroke="#a05820" stroke-width="8" stroke-linecap="butt"/>
  <line x1="235" y1="144" x2="252" y2="144" stroke="#3aad3a" stroke-width="8" stroke-linecap="butt"/>
  <line x1="80" y1="132" x2="255" y2="132" stroke="#a05820" stroke-width="8" stroke-linecap="butt"/>
  <line x1="255" y1="132" x2="276" y2="132" stroke="#3aad3a" stroke-width="8" stroke-linecap="butt"/>
  <line x1="80" y1="120" x2="275" y2="120" stroke="#a05820" stroke-width="8" stroke-linecap="butt"/>
  <line x1="275" y1="120" x2="300" y2="120" stroke="#3aad3a" stroke-width="8" stroke-linecap="butt"/>
  <text x="190" y="212" text-anchor="middle" font-family="monospace" font-size="13" fill="#3aad3a">&#x2264;45&#xb0;  OK</text>

  <!-- Divider -->
  <line x1="340" y1="105" x2="340" y2="195" stroke="#333" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- RIGHT: Bad overhang >60° -->
  <line x1="380" y1="180" x2="460" y2="180" stroke="#a05820" stroke-width="8" stroke-linecap="butt"/>
  <line x1="380" y1="168" x2="475" y2="168" stroke="#a05820" stroke-width="8" stroke-linecap="butt"/>
  <line x1="475" y1="168" x2="500" y2="168" stroke="#cc3333" stroke-width="8" stroke-linecap="butt"/>
  <line x1="380" y1="156" x2="490" y2="156" stroke="#a05820" stroke-width="8" stroke-linecap="butt"/>
  <line x1="490" y1="156" x2="530" y2="156" stroke="#cc3333" stroke-width="8" stroke-linecap="butt"/>
  <line x1="380" y1="144" x2="505" y2="144" stroke="#a05820" stroke-width="8" stroke-linecap="butt"/>
  <line x1="505" y1="144" x2="560" y2="144" stroke="#cc3333" stroke-width="8" stroke-linecap="butt"/>
  <line x1="380" y1="132" x2="520" y2="132" stroke="#a05820" stroke-width="8" stroke-linecap="butt"/>
  <line x1="520" y1="132" x2="590" y2="132" stroke="#cc3333" stroke-width="8" stroke-linecap="butt"/>
  <line x1="380" y1="120" x2="535" y2="120" stroke="#a05820" stroke-width="8" stroke-linecap="butt"/>
  <line x1="535" y1="120" x2="620" y2="120" stroke="#cc3333" stroke-width="8" stroke-linecap="butt"/>
  <text x="500" y="212" text-anchor="middle" font-family="monospace" font-size="13" fill="#cc3333">&gt;60&#xb0;  WARN</text>
</svg>
