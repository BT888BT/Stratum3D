<svg width="100%" viewBox="0 0 680 230" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>3D print warping with shrinkage and lift arrows</title>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#cc3333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="680" height="230" rx="12" fill="#1a1a14"/>

  <!-- Build plate -->
  <line x1="60" y1="165" x2="620" y2="165" stroke="#444" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="340" y="182" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">build plate</text>

  <!-- Warped layers (bottom to top, each progressively lighter amber) -->
  <path d="M88 137 Q92 143 100 147 Q110 150 130 150 L550 150 Q570 150 580 147 Q588 143 592 137" fill="none" stroke="#8a5a2a" stroke-width="7" stroke-linecap="round"/>
  <path d="M86 128 Q90 134 98 138 Q108 141 130 141 L550 141 Q572 141 582 138 Q590 134 594 128" fill="none" stroke="#a06830" stroke-width="7" stroke-linecap="round"/>
  <path d="M84 119 Q88 125 96 129 Q106 132 130 132 L550 132 Q574 132 584 129 Q592 125 596 119" fill="none" stroke="#c8853a" stroke-width="7" stroke-linecap="round"/>
  <path d="M82 110 Q86 116 94 120 Q104 123 130 123 L550 123 Q576 123 586 120 Q594 116 598 110" fill="none" stroke="#e8a050" stroke-width="7" stroke-linecap="round"/>

  <!-- Shrinkage arrows (inward along top of part) -->
  <line x1="230" y1="98" x2="290" y2="98" stroke="#cc3333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="98" x2="390" y2="98" stroke="#cc3333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="340" y="93" text-anchor="middle" font-family="monospace" font-size="11" fill="#cc3333">shrinkage</text>

  <!-- Lift arrows (upward at corners) -->
  <line x1="78" y1="148" x2="78" y2="118" stroke="#cc3333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="602" y1="148" x2="602" y2="118" stroke="#cc3333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="52" y="113" text-anchor="middle" font-family="monospace" font-size="11" fill="#cc3333">lift</text>
  <text x="630" y="113" text-anchor="middle" font-family="monospace" font-size="11" fill="#cc3333">lift</text>
</svg>
